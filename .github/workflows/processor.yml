name: Pitch Deck Processor

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9am UTC
  workflow_dispatch:      # Allow manual runs from GitHub UI

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth-oauthlib google-api-python-client \
                      anthropic pypdf python-pptx requests

      - name: Restore credentials and token
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.TOKEN_PICKLE_B64 }}' | base64 -d > token.pickle

      - name: Run processor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          CONFIRM_TOKEN: ${{ secrets.CONFIRM_TOKEN }}
        run: python3 processor.py
